#cloud-config

# ==============================================
# Hetzner VPS Bootstrap — Perro Paco
# Apply when creating the CCX13 in Hetzner Cloud
# ==============================================
# Before using: Replace ADMIN_SSH_KEY_PLACEHOLDER with your personal public key
# (contents of ~/.ssh/perropaco.pub). The deploy key is already included.

users:
  - name: deploy
    groups: sudo, docker
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      # Personal admin key - REPLACE with your ~/.ssh/perropaco.pub
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOy7bSvaRBIlZKaGXCEuFK3pxmB9o7U5mLvyw+J0DqWJ perropaco-admin
      # CI/CD deploy key (from keys/deploy_perropaco.pub)
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFkO+HcJ8432aDQ10wkpjmUZpuNUzlSvjNo28YV7Sv40 perropaco-deploy

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades

runcmd:
  # Docker CE (official repo)
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin

  # Docker log rotation
  - |
    cat > /etc/docker/daemon.json << 'EOF'
    {
      "log-driver": "json-file",
      "log-opts": {
        "max-size": "10m",
        "max-file": "3"
      }
    }
    EOF
  - systemctl restart docker
  # SSH hardening
  - sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/#PermitRootLogin yes/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's/PermitRootLogin yes/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's/PermitRootLogin without-password/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's/PermitRootLogin prohibit-password/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's/#MaxAuthTries 6/MaxAuthTries 3/' /etc/ssh/sshd_config
  - systemctl restart ssh

  # Firewall
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Project directories
  - mkdir -p /opt/traefik
  - mkdir -p /opt/portainer
  - mkdir -p /opt/perropaco-dev
  - mkdir -p /opt/perropaco-prd
  - mkdir -p /opt/backups
  - mkdir -p /opt/scripts
  - chown -R deploy:deploy /opt/traefik /opt/portainer /opt/perropaco-dev /opt/perropaco-prd /opt/backups /opt/scripts

  # Docker network for Traefik
  - docker network create traefik-public || true
