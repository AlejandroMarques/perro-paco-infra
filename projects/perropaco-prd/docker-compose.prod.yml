services:
  db:
    image: postgres:16-alpine
    container_name: perropaco-prd-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
      APP_DB_USER: ${APP_DB_USER:-perropaco_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - perropaco_prd_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: ghcr.io/alejandromarques/perro-paco-api:${API_IMAGE_TAG:-latest}
    container_name: perropaco-prd-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: "${DATABASE_PORT}"
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_ISSUER: ${JWT_ISSUER}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FCM_SERVICE_ACCOUNT_PATH: ${FCM_SERVICE_ACCOUNT_PATH:-}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.perropaco-prd-api.rule=Host(`api.perropaco.org`)"
      - "traefik.http.routers.perropaco-prd-api.entrypoints=websecure"
      - "traefik.http.routers.perropaco-prd-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.perropaco-prd-api.loadbalancer.server.port=4000"
    volumes:
      - /home/deploy/fcm_credentials/perro-paco-prod.json:/run/secrets/fcm-sa.json:ro

  admin:
    image: ghcr.io/alejandromarques/perro-paco-admin-app:${ADMIN_IMAGE_TAG:-latest}
    container_name: perropaco-prd-admin
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.perropaco-prd-admin.rule=Host(`admin.perropaco.org`)"
      - "traefik.http.routers.perropaco-prd-admin.entrypoints=websecure"
      - "traefik.http.routers.perropaco-prd-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.perropaco-prd-admin.loadbalancer.server.port=80"

volumes:
  perropaco_prd_pgdata:

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge
