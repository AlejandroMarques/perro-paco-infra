services:
  db:
    image: postgres:16-alpine
    container_name: perropaco-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - perropaco_dev_pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: ghcr.io/alejandromarques/perro-paco-api:${API_IMAGE_TAG:-latest}
    container_name: perropaco-dev-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_ISSUER: ${JWT_ISSUER}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FCM_SERVICE_ACCOUNT_PATH: ${FCM_SERVICE_ACCOUNT_PATH:-}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.perropaco-dev-api.rule=Host(`api.dev.perropaco.org`)"
      - "traefik.http.routers.perropaco-dev-api.entrypoints=websecure"
      - "traefik.http.routers.perropaco-dev-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.perropaco-dev-api.loadbalancer.server.port=4000"

  admin:
    image: ghcr.io/alejandromarques/perro-paco-admin-app:${ADMIN_IMAGE_TAG:-latest}
    container_name: perropaco-dev-admin
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.perropaco-dev-admin.rule=Host(`app.dev.perropaco.org`)"
      - "traefik.http.routers.perropaco-dev-admin.entrypoints=websecure"
      - "traefik.http.routers.perropaco-dev-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.perropaco-dev-admin.loadbalancer.server.port=80"

volumes:
  perropaco_dev_pgdata:

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge
